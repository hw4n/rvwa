name: Build Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Collect build artifact
        run: |
          mkdir -p dist-artifacts/next-build
          cp -R .next dist-artifacts/next-build/.next
          rm -rf dist-artifacts/next-build/.next/cache
          if [ -d public ]; then
            cp -R public dist-artifacts/next-build/public
          fi
          cp package.json pnpm-lock.yaml next.config.ts dist-artifacts/next-build/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: dist-artifacts/next-build
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7
